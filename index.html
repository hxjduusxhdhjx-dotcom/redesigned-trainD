<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZ ANIME ULTRA | الواجهة العالمية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --main: #ff0000;
            --main-dark: #8b0000;
            --bg: #050505;
            --card-bg: #121212;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* NAVBAR احترافي */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 6%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            position: fixed; width: 100%; top: 0; z-index: 2000;
            border-bottom: 1px solid var(--glass);
        }
        .logo { font-weight: 900; font-size: 26px; color: #fff; text-decoration: none; display: flex; align-items: center; }
        .logo i { color: var(--main); margin-left: 10px; font-size: 30px; filter: drop-shadow(0 0 8px var(--main)); }
        .logo span { color: var(--main); }

        .search-box { position: relative; }
        .search-box input {
            padding: 10px 40px 10px 15px;
            border-radius: 30px; border: 1px solid var(--glass);
            background: #1a1a1a; color: #fff; outline: none; width: 250px;
        }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--main); }

        /* HERO SECTION سينمائي */
        .hero {
            height: 75vh;
            background: linear-gradient(to bottom, transparent, var(--bg)), 
                        url('https://wallpaperaccess.com/full/151124.jpg') center/cover;
            display: flex; align-items: flex-end; padding: 60px 6%;
            position: relative;
        }
        .hero-content { max-width: 600px; margin-bottom: 40px; animation: fadeInUp 1s ease; }
        .hero-content h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 15px; }
        .hero-content p { font-size: 1.1rem; color: #ccc; margin-bottom: 25px; }
        .btn-play {
            padding: 12px 35px; background: var(--main); border: none; color: #fff;
            border-radius: 50px; font-weight: 900; cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
        }
        .btn-play:hover { background: #fff; color: var(--main); transform: scale(1.05); }

        /* الأنميات - GRID */
        .container { padding: 40px 6%; }
        .section-title { font-size: 24px; font-weight: 900; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 5px; height: 25px; background: var(--main); border-radius: 5px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            position: relative; cursor: pointer; border: 1px solid var(--glass);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--main); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        
        .card-info {
            padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9));
            position: absolute; bottom: 0; width: 100%;
        }
        .card-title { font-size: 14px; font-weight: bold; text-align: center; }

        /* MODAL ذكي */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px;
            backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0f0f0f; width: 100%; max-width: 1000px; border-radius: 20px;
            position: relative; max-height: 90vh; overflow-y: auto; border: 1px solid var(--glass);
        }
        .close-modal { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 10; color: #fff; }

        /* PLAYER & SERVERS */
        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; display: none; margin-bottom: 20px; border-radius: 10px 10px 0 0; }
        iframe { width: 100%; height: 100%; border: none; }

        .details-padding { padding: 30px; }
        .server-list { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .server-item {
            padding: 10px 25px; background: var(--glass); border-radius: 10px; 
            cursor: pointer; white-space: nowrap; border: 1px solid transparent;
        }
        .server-item.active { background: var(--main); border-color: #fff; }

        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
        .ep-link {
            background: #1a1a1a; padding: 15px; border-radius: 8px; text-align: center;
            font-size: 13px; font-weight: bold; cursor: pointer; border: 1px solid var(--glass);
        }
        .ep-link:hover { background: var(--main); transform: scale(1.05); }
        .ep-link.active { background: var(--main); box-shadow: 0 0 15px var(--main); }

        /* LOADER */
        .loader { width: 50px; height: 50px; border: 5px solid #222; border-top-color: var(--main); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* للهواتف */
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .hero { height: 50vh; }
            .search-box input { width: 150px; }
            .logo span { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo"><i class="fa-solid fa-dragon"></i> DZ<span>ANIME</span></a>
    <div class="search-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن أنمي..." onkeyup="handleSearch(this.value)">
    </div>
</nav>

<section class="hero" id="heroSec">
    <div class="hero-content">
        <h1 id="heroTitle">مرحباً بك في عالمك الخاص</h1>
        <p>أكبر مكتبة أنمي بجودة 4K وسيرفرات صاروخية بدون إعلانات مزعجة.</p>
        <button class="btn-play" onclick="document.getElementById('mainContent').scrollIntoView({behavior:'smooth'})">
            <i class="fa-solid fa-play"></i> ابدأ المشاهدة
        </button>
    </div>
</section>

<div class="container" id="mainContent">
    <div class="section-title">الأكثر شعبية الآن</div>
    <div id="loader" class="loader"></div>
    <div id="mainGrid" class="grid"></div>
</div>

<div id="animeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeAnime()">&times;</span>
        
        <div id="playerArea" class="player-box">
            <iframe id="videoPlayer" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>

        <div class="details-padding">
            <h2 id="modalTitle" style="margin-bottom: 20px; font-size: 28px;"></h2>
            
            <div class="server-list" id="serverBox"></div>
            
            <div style="margin-top: 20px; font-weight: bold; color: var(--main);">الحلقات المتاحة:</div>
            <div id="episodesBox" class="episodes-grid" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://api.jikan.moe/v4";
    const STREAM_API = "https://api.consumet.org/anime/gogoanime";
    const cache = {};

    // 1. تحميل الأنميات للواجهة
    async function initApp() {
        try {
            const res = await fetch(`${API_URL}/top/anime?limit=24`);
            const data = await res.json();
            document.getElementById('loader').style.display = 'none';
            renderAnime(data.data);
        } catch (e) { console.error("API Error"); }
    }

    function renderAnime(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.map(anime => `
            <div class="card" onclick="openAnime('${anime.mal_id}', '${anime.title.replace(/'/g, "")}', '${anime.images.jpg.large_image_url}')">
                <img src="${anime.images.jpg.image_url}" loading="lazy">
                <div class="card-info">
                    <div class="card-title">${anime.title}</div>
                </div>
            </div>
        `).join('');
    }

    // 2. فتح تفاصيل الأنمي
    async function openAnime(id, title, bg) {
        window.currentAnime = { id, title };
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('animeModal').classList.add('active');
        document.getElementById('playerArea').style.display = 'none';
        document.getElementById('episodesBox').innerHTML = '<div class="loader"></div>';
        
        // جلب السيرفرات (Gogo, Zoro, etc)
        const serverBox = document.getElementById('serverBox');
        serverBox.innerHTML = `
            <div class="server-item active" onclick="loadEpisodes('gogoanime')">سيرفر Anime4Up</div>
            <div class="server-item" onclick="loadEpisodes('zoro')">سيرفر Zoro VIP</div>
        `;

        loadEpisodes('gogoanime');
    }

    // 3. جلب الحلقات بشكل "متخفي"
    async function loadEpisodes(provider) {
        const box = document.getElementById('episodesBox');
        const cleanName = window.currentAnime.title.replace(/\([^)]*\)/g, "").trim();

        try {
            const res = await fetch(`https://api.consumet.org/anime/${provider}/info/${encodeURIComponent(cleanName)}`);
            const data = await res.json();
            
            if (data.episodes && data.episodes.length > 0) {
                box.innerHTML = data.episodes.map(ep => `
                    <div class="ep-link" onclick="playEpisode('${provider}', '${ep.id}', this)">حلقة ${ep.number}</div>
                `).join('');
            } else {
                box.innerHTML = '<p>عذراً، لم نجد حلقات لهذا الأنمي في هذا السيرفر.</p>';
            }
        } catch (e) { box.innerHTML = '<p>خطأ في الاتصال بالسيرفر، جرب سيرفر آخر.</p>'; }
    }

    // 4. تشغيل الفيديو
    async function playEpisode(provider, epId, btn) {
        const playerArea = document.getElementById('playerArea');
        const frame = document.getElementById('videoPlayer');
        
        document.querySelectorAll('.ep-link').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');

        playerArea.style.display = 'block';
        frame.src = 'about:blank';
        playerArea.scrollIntoView({ behavior: 'smooth' });

        try {
            const res = await fetch(`https://api.consumet.org/anime/${provider}/watch/${epId}`);
            const data = await res.json();
            const source = data.sources.find(s => s.quality === 'default' || s.quality === '720p') || data.sources[0];
            frame.src = source.url;
        } catch (e) { alert("خطأ في تشغيل الفيديو."); }
    }

    // بحث متقدم
    let timer;
    function handleSearch(q) {
        clearTimeout(timer);
        timer = setTimeout(async () => {
            if(!q.trim()) return initApp();
            document.getElementById('mainGrid').innerHTML = '<div class="loader"></div>';
            const res = await fetch(`${API_URL}/anime?q=${q}&limit=20`);
            const data = await res.json();
            renderAnime(data.data);
        }, 600);
    }

    function closeAnime() {
        document.getElementById('animeModal').classList.remove('active');
        document.getElementById('videoPlayer').src = '';
    }

    window.onload = initApp;
</script>

</body>
</html>
